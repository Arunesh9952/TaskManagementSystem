<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
<h2 class="fw-bold">Tasks</h2>
<a routerLink="/create-task" class="btn btn-success">+ Create Task</a>
</div>

<div class="card shadow">

<div class="card-body">

<table class="table table-hover text-center">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Title</th>
<th>Description</th>
<th>Due Date</th>
<th>Status</th>
<th>Action</th>
</tr>


</thead>

<tbody>

<tr *ngFor="let task of tasks">

<td>{{task.taskId}}</td>
<td>{{task.title}}</td>
<td>{{task.description}}</td>
<td>{{task.dueDate}}</td>
<td>{{task.status}}</td>

<td>
<button class="btn btn-danger"
(click)="delete(task.taskId)">
Delete
</button>
</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>
